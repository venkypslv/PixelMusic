name: Build Nightly APK

on:
  push:
    branches: [ master ]
  schedule:
    # Runs at 02:17 America/Buenos_Aires.
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: nightly-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      current-sha: ${{ steps.nightly-changes.outputs.current-sha }}
      previous-sha: ${{ steps.nightly-changes.outputs.previous-sha }}
      should-build: ${{ steps.check-should-build.outputs.should-build }}
      short-sha: ${{ steps.nightly-changes.outputs.short-sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Read version from gradle.properties (single source of truth) ──────────
      - name: Read version name
        id: version
        run: |
          VERSION_NAME=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION_NAME"

      # ── Check if version tag already exists ───────────────────
      - name: Check if version tag already exists
        id: version_check
        run: |
          TAG="v${{ steps.version.outputs.version_name }}"
          if git tag --list "$TAG" | grep -q "$TAG"; then
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists locally — NOT a new release."
          else
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist — this IS a new version. GitHub Release will handle it."
          fi

      - name: Check for new master changes
        id: nightly-changes
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'nightly-apk.yml';
            const currentSha = context.sha;
            const shortSha = currentSha.slice(0, 7);

            if (context.eventName === 'workflow_dispatch' || context.eventName === 'push') {
              core.setOutput('current-sha', currentSha);
              core.setOutput('previous-sha', '');
              core.setOutput('short-sha', shortSha);
              core.setOutput('should-build', 'true');
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id,
              branch: 'master',
              status: 'success',
              per_page: 20,
            });

            const previousRun = runs.find((run) => run.id !== context.runId);
            const previousSha = previousRun?.head_sha ?? '';
            const shouldBuild = previousSha !== currentSha;

            core.setOutput('current-sha', currentSha);
            core.setOutput('previous-sha', previousSha);
            core.setOutput('short-sha', shortSha);
            core.setOutput('should-build', shouldBuild ? 'true' : 'false');

      - name: Determine final should-build
        id: check-should-build
        run: |
          # If version is bumped (is_new_version == 'true'), we do NOT build nightly
          if [ "${{ steps.version_check.outputs.is_new_version }}" = "true" ]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "Version is bumped. Skipping nightly build so official release workflow can handle it."
          else
            echo "should-build=${{ steps.nightly-changes.outputs.should-build }}" >> "$GITHUB_OUTPUT"
            echo "Version is not bumped. Final should-build: ${{ steps.nightly-changes.outputs.should-build }}"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vz-pixelmusic.jks

      - name: Create keystore.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Create local.properties
        run: |
          echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" > local.properties
          echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> local.properties

      - name: Get commit count
        id: commit_count
        run: echo "count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Phone nightly release APKs
        run: ./gradlew :app:assembleRelease -Ppixelmusic.enableAbiSplits=true -PAPP_VERSION_CODE=${{ steps.commit_count.outputs.count }}

      - name: Build Wear OS nightly release APK
        run: ./gradlew :wear:assembleRelease -PAPP_VERSION_CODE=${{ steps.commit_count.outputs.count }}

      - name: Verify Phone nightly split APKs
        run: |
          BUILD_TOOLS_VERSION="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          for apk in \
            app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk \
            app/build/outputs/apk/release/app-x86_64-release.apk \
            app/build/outputs/apk/release/app-universal-release.apk
          do
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2" dump badging "$apk" >/dev/null
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner" verify --verbose "$apk"
          done

      - name: Upload Phone nightly split APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: PixelMusic-phone-nightly-${{ needs.changes.outputs.short-sha }}
          path: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            app/build/outputs/apk/release/app-x86_64-release.apk
            app/build/outputs/apk/release/app-universal-release.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Generate Changelog
        id: changelog
        env:
          PREV_SHA: ${{ needs.changes.outputs.previous-sha }}
          CURR_SHA: ${{ needs.changes.outputs.current-sha }}
        run: |
          python3 -c "
          import subprocess
          import html
          import os

          prev_sha = os.environ.get('PREV_SHA', '')
          curr_sha = os.environ.get('CURR_SHA', '')

          if prev_sha and prev_sha != '0000000000000000000000000000000000000000':
              cmd = ['git', 'log', '--pretty=format:%s', f'{prev_sha}..{curr_sha}']
          else:
              cmd = ['git', 'log', '-n', '5', '--pretty=format:%s']

          try:
              output = subprocess.check_output(cmd).decode('utf-8', errors='ignore')
              commits = [line.strip() for line in output.split('\n') if line.strip()]
          except Exception as e:
              commits = ['New nightly build']

          if commits:
              changelog = '<blockquote>' + '\n'.join(html.escape(c) for c in commits) + '</blockquote>'
          else:
              changelog = '<blockquote>New nightly build</blockquote>'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog<<EOF\n' + changelog + '\nEOF\n')
          "

      - name: Get version name
        id: get-version
        run: |
          BUILD_TOOLS_VERSION="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          VERSION_NAME=$("$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2" dump badging \
            app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            | grep versionName | sed -E "s/.*versionName='([^']*)'.*/\1/")
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install Telethon for Telegram upload
        run: pip install -q telethon

      - name: Restore Telegram session cache
        uses: actions/cache@v5
        with:
          path: bot_session.session
          key: telegram-session-${{ runner.os }}-bot_session

      - name: Publish Nightly to Telegram Channel
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          COMMIT_SHA: ${{ needs.changes.outputs.current-sha }}
          VERSION_NAME: ${{ steps.get-version.outputs.version_name }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_API_ID" ]; then
            echo "Telegram secrets not set, skipping publishing."
            exit 0
          fi
          python3 .github/scripts/publish_telegram.py
